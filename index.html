<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Propiedades de la Materia</title>

<style>
body { font-family: Arial; background:#f4f6f9; text-align:center; }
h1 { margin-top:20px; }

.container {
  display:flex;
  justify-content:space-around;
  margin:20px;
}

.box {
  width:40%;
  min-height:250px;
  padding:10px;
  border-radius:10px;
}

#fisicas { background:#d0ebff; }
#quimicas { background:#ffd6d6; }

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:white;
  padding:10px;
  margin:5px;
  border-radius:8px;
  cursor:grab;
  border:1px solid #ccc;
}

.correct { background:#c8f7c5 !important; }
.incorrect { background:#f7c5c5 !important; }

#score { font-size:20px; margin:10px; }
</style>
</head>

<body>

<h1>Clasifica las Propiedades</h1>
<p>Arrastra cada tarjeta (no se puede cambiar después)</p>

<div id="score">Puntos: 0</div>

<div class="container">
  <div id="fisicas" class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h2>Físicas</h2>
  </div>

  <div id="quimicas" class="box" ondrop="drop(event)" ondragover="allowDrop(event)">
    <h2>Químicas</h2>
  </div>
</div>

<div class="cards" id="cards"></div>

<script>

let score = 0;

const propiedades = [
  {nombre:"Color", tipo:"fisicas"},
  {nombre:"Masa", tipo:"fisicas"},
  {nombre:"Volumen", tipo:"fisicas"},
  {nombre:"Densidad", tipo:"fisicas"},
  {nombre:"Punto de ebullición", tipo:"fisicas"},
  {nombre:"Punto de fusión", tipo:"fisicas"},
  {nombre:"Solubilidad", tipo:"fisicas"},
  {nombre:"Conductividad eléctrica", tipo:"fisicas"},
  {nombre:"Conductividad térmica", tipo:"fisicas"},
  {nombre:"Estado físico", tipo:"fisicas"},
  {nombre:"Dureza", tipo:"fisicas"},
  {nombre:"Elasticidad", tipo:"fisicas"},
  {nombre:"Viscosidad", tipo:"fisicas"},
  {nombre:"Maleabilidad", tipo:"fisicas"},
  {nombre:"Sublimación", tipo:"fisicas"},

  {nombre:"Inflamabilidad", tipo:"quimicas"},
  {nombre:"Oxidación", tipo:"quimicas"},
  {nombre:"Corrosión", tipo:"quimicas"},
  {nombre:"Reactividad con ácidos", tipo:"quimicas"},
  {nombre:"Reactividad con bases", tipo:"quimicas"},
  {nombre:"Combustión", tipo:"quimicas"},
  {nombre:"Descomposición", tipo:"quimicas"},
  {nombre:"Toxicidad", tipo:"quimicas"},
  {nombre:"Fermentación", tipo:"quimicas"},
  {nombre:"Oxidarse", tipo:"quimicas"},
  {nombre:"Reducirse", tipo:"quimicas"},
  {nombre:"Estabilidad química", tipo:"quimicas"},
  {nombre:"Radioactividad", tipo:"quimicas"},
  {nombre:"Formación de precipitado", tipo:"quimicas"},
  {nombre:"Electronegatividad", tipo:"quimicas"}
];

function crearTarjetas(){
  const cont = document.getElementById("cards");
  propiedades.sort(()=>Math.random()-0.5);

  propiedades.forEach((p,i)=>{
    let div = document.createElement("div");
    div.className="card";
    div.id="c"+i;
    div.draggable=true;
    div.textContent=p.nombre;
    div.dataset.tipo=p.tipo;
    div.dataset.usada="false";
    div.ondragstart=drag;
    cont.appendChild(div);
  });
}

function allowDrop(ev){ ev.preventDefault(); }

function drag(ev){
  let card = ev.target;
  if(card.dataset.usada === "true"){
    ev.preventDefault(); // NO permitir mover
    return;
  }
  ev.dataTransfer.setData("text", card.id);
}

function drop(ev){
  ev.preventDefault();

  let data = ev.dataTransfer.getData("text");
  let card = document.getElementById(data);

  // Si ya fue usada, no hacer nada
  if(card.dataset.usada === "true") return;

  let tipoCorrecto = card.dataset.tipo;
  let zona = ev.currentTarget.id;

  if(tipoCorrecto === zona){
    card.classList.add("correct");
    score++;
  } else {
    card.classList.add("incorrect");
    score--;
  }

  // MARCAR COMO USADA (no se puede mover más)
  card.dataset.usada = "true";
  card.draggable = false;

  document.getElementById("score").innerText = "Puntos: " + score;
  ev.currentTarget.appendChild(card);
}

crearTarjetas();

</script>

</body>
</html>
